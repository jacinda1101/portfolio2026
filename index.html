  <!-- SVG Curve Lines -->
  <svg id="svg-lines"></svg>

  <script>
    const nodes = document.querySelectorAll('.node');

    // 拖曳功能
    nodes.forEach(node => {
      let offsetX, offsetY, isDragging = false;

      node.addEventListener('mousedown', e => {
        isDragging = true;
        offsetX = e.clientX - node.offsetLeft;
        offsetY = e.clientY - node.offsetTop;
        node.style.zIndex = 1000;
      });

      document.addEventListener('mousemove', e => {
        if (isDragging) {
          node.style.left = `${e.clientX - offsetX}px`;
          node.style.top = `${e.clientY - offsetY}px`;
          drawCurves();
        }
      });

      document.addEventListener('mouseup', () => {
        isDragging = false;
        node.style.zIndex = '';
      });
    });

    const connections = [
      ['node1', 'node2'],
      ['node2', 'node3'],
      ['node2', 'node4'],
      ['node2', 'node5'],
      ['node2', 'node6'],
      ['node2', 'node7'],
    ];


    function getCenter(el) {
      return {
        x: el.offsetLeft + el.offsetWidth / 2,
        y: el.offsetTop + el.offsetHeight / 2,
      };
    }

    function drawCurves() {
      const svg = document.getElementById('svg-lines');
      svg.innerHTML = ''; // clear

      connections.forEach(([fromId, toId]) => {
        const from = document.getElementById(fromId);
        const to = document.getElementById(toId);

        const p1 = getCenter(from);
        const p2 = getCenter(to);
        const dx = Math.abs(p2.x - p1.x) * 0.5;

        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");

// Cubic Bezier Path
const d = `
  M ${p1.x},${p1.y}
  C ${p1.x + dx},${p1.y} ${p2.x - dx},${p2.y} ${p2.x},${p2.y}
`;

path.setAttribute('d', d);
path.setAttribute('fill', 'none');
path.setAttribute('stroke', 'white');
path.setAttribute('stroke-width', '2');
path.setAttribute('stroke-dasharray', '2 2');
path.style.animation = 'dash 1s linear infinite';

svg.appendChild(path);
        });
        }

    drawCurves();

    const node1 = document.getElementById('node1');
const infoMenu = node1.querySelector('.info-menu');

const node3 = document.getElementById('node3');

node3.addEventListener('click', () => {
  const popupContainer = document.createElement('div');
  popupContainer.style.position = 'fixed';
  popupContainer.style.top = '50%';
  popupContainer.style.left = '50%';
  popupContainer.style.transform = 'translate(-50%, -50%)';
  popupContainer.style.zIndex = '10000';

  const popupImage = document.createElement('img');
  popupImage.src = './img/whalev.webp';
  popupImage.style.maxWidth = '100%';
  popupImage.style.maxHeight = '100%';
  popupImage.style.boxShadow = '0 4px 8px rgba(0, 0, 0, 0.2)';
  popupImage.style.border = '1px solid #9e9f9e'; // 新增圖片邊框

  const closeButton = document.createElement('button');
  closeButton.textContent = 'X';
  closeButton.style.position = 'absolute';
  closeButton.style.top = '10px';
  closeButton.style.right = '10px';
  closeButton.style.backgroundColor = '#564d77'; // 修改 XX 按鈕的底色
  closeButton.style.color = 'white';
  closeButton.style.border = 'none';
  closeButton.style.padding = '5px 10px';
  closeButton.style.cursor = 'pointer';

  closeButton.addEventListener('click', () => {
    document.body.removeChild(popupContainer);
  });

  popupContainer.appendChild(popupImage);
  popupContainer.appendChild(closeButton);
  document.body.appendChild(popupContainer);
});
